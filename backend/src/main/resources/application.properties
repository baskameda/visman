# =============================================================================
#  Visitor POC - Application Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Server
# -----------------------------------------------------------------------------
server.port=8080

# -----------------------------------------------------------------------------
# SQL Server DataSource
# Replace YourPassword123! with your actual SA / app-user password.
# Set encrypt=true and configure trustServerCertificate=false in production.
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:sqlserver://192.168.201.103:1433;databaseName=VmOnClaude;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Password#1441BERLIN
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# -----------------------------------------------------------------------------
# Liquibase  (application-level schema management)
# Operaton manages its own schema internally; Liquibase here is for any
# application-specific tables added in the future.
# -----------------------------------------------------------------------------
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# -----------------------------------------------------------------------------
# Operaton BPM Engine
# -----------------------------------------------------------------------------
# Admin user created on first start (Cockpit / Tasklist / Admin UI login)
operaton.bpm.admin-user.id=admin
operaton.bpm.admin-user.password=admin
operaton.bpm.admin-user.first-name=Admin
operaton.bpm.admin-user.last-name=User
operaton.bpm.admin-user.email=admin@visitor-poc.local

# Let Operaton create/update its DB schema automatically
operaton.bpm.database.type=mssql
operaton.bpm.database.schema-update=true

# SQL Server JDBC does not return affected-row counts for batched statements;
# disable batch processing to avoid ENGINE-03089.
operaton.bpm.generic-properties.properties.jdbcBatchProcessing=false

# Sets history default to 30 days
operaton.bpm.generic-properties.properties.historyTimeToLive: P30D
# Auto-deploy all BPMN files under classpath:processes/
operaton.bpm.auto-deployment-enabled=true


# History level: full audit trail
operaton.bpm.history-level=full

# Job executor (async tasks)
operaton.bpm.job-execution.enabled=true

# REST API
operaton.bpm.rest.path=/engine-rest

# Show the reason string from ResponseStatusException in error responses
server.error.include-message=always

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging.level.org.operaton=INFO
logging.level.eu.poc.claude=DEBUG
logging.level.liquibase=INFO
